# Direct dependencies only.
# Generate exact lock: conda env export > environment.lock.yml
name: musclemap-model
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.1,<3.0
  - pytorch-cuda=12.1
  - numpy>=1.24,<2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - tqdm>=4.65
  - pyyaml>=6.0
  - pip
  - pip:
    - transformers>=4.38,<5.0
    - peft>=0.10
    - wandb>=0.16
    - gradio>=4.20,<5.0
    - einops>=0.7
    - accelerate>=0.27
    - ruff>=0.4
    - pytest>=7.4
    - pytest-cov>=4.1
